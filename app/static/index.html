<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Used Vehicle Parts Search</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
  .pill { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:0.75rem; font-weight:600; }
  .pill-bmw  { background:#dbeafe; color:#1e40af; }
  .pill-vw   { background:#dcfce7; color:#166534; }
  .pill-other{ background:#f3f4f6; color:#374151; }
  details > summary::-webkit-details-marker { display:none; }
  details > summary { list-style:none; cursor:pointer; }
  details > summary:active { background:#f8fafc; }
  #progress-banner { display:none; }
  #progress-banner.visible { display:block; }
  .progress-track { background:#e2e8f0; border-radius:9999px; height:8px; overflow:hidden; }
  .progress-fill  { height:100%; border-radius:9999px; background:#2563eb; transition:width 0.4s ease; }
  @keyframes indeterminate { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
  .progress-fill.indeterminate { width:25% !important; animation:indeterminate 1.4s ease infinite; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-7xl mx-auto px-3 py-4 sm:p-6">

  <header class="flex flex-wrap items-start justify-between gap-3 mb-4 sm:mb-6">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold">RadioB Used Parts Search</h1>
      <p id="status-line" class="text-xs sm:text-sm text-slate-500 mt-0.5">Loading status…</p>
    </div>
    <div class="flex gap-2">
      <button id="btn-run"
        class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-semibold px-4 py-2.5 rounded-lg disabled:opacity-50 touch-manipulation">
        Run now
      </button>
      <button id="btn-refresh"
        class="bg-slate-200 hover:bg-slate-300 active:bg-slate-400 text-slate-800 text-sm font-semibold px-4 py-2.5 rounded-lg touch-manipulation">
        Refresh
      </button>
      <button id="btn-clear"
        class="bg-slate-200 hover:bg-slate-300 active:bg-slate-400 text-slate-800 text-sm font-semibold px-4 py-2.5 rounded-lg touch-manipulation">
        Clear cache
      </button>
    </div>
  </header>

  <!-- Progress banner -->
  <div id="progress-banner" class="bg-white rounded-xl shadow-sm border border-blue-200 p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <span id="progress-phase" class="text-sm font-semibold text-blue-700"></span>
      <span id="progress-counts" class="text-xs text-slate-500"></span>
    </div>
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill indeterminate" style="width:0%"></div>
    </div>
    <div id="progress-vehicle" class="text-xs text-slate-400 mt-1 truncate"></div>
  </div>

  <!-- Filters -->
  <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-4 mb-4">
    <div class="flex flex-wrap items-end gap-3 sm:gap-4 mb-3">
      <div>
        <label class="text-xs font-semibold text-slate-600 block mb-1">Make</label>
        <select id="filter-make" class="border rounded-lg px-2.5 py-2 text-sm min-w-[90px]">
          <option value="">All</option>
          <option value="BMW">BMW</option>
          <option value="Volkswagen">VW</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600 block mb-1">Location</label>
        <select id="filter-yard" class="border rounded-lg px-2.5 py-2 text-sm min-w-[160px]">
          <option value="">All locations</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600 block mb-1">Sort by</label>
        <select id="filter-sort" class="border rounded-lg px-2.5 py-2 text-sm">
          <option value="value">Value ↓</option>
          <option value="added">Newest added</option>
          <option value="year">Year ↓</option>
          <option value="make">Make / model</option>
        </select>
      </div>
      <div class="text-xs text-slate-400 self-end pb-2" id="result-count">—</div>
    </div>
    <!-- Exclude filters -->
    <div class="border-t border-slate-100 pt-3">
      <p class="text-xs font-semibold text-slate-500 mb-2">Exclude from parts results</p>
      <div class="flex flex-wrap gap-x-4 gap-y-1.5">
        <label class="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none">
          <input type="checkbox" id="ex-engine" class="rounded" />
          Engines &amp; motors
        </label>
        <label class="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none">
          <input type="checkbox" id="ex-trans" class="rounded" />
          Transmissions
        </label>
        <label class="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none">
          <input type="checkbox" id="ex-door" class="rounded" />
          Doors
        </label>
        <label class="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none">
          <input type="checkbox" id="ex-body" class="rounded" />
          Body panels (hood, fender, bumper)
        </label>
      </div>
    </div>
  </section>

  <!-- Vehicle cards -->
  <section id="vehicles" class="grid gap-3"></section>

  <footer class="text-xs text-slate-400 mt-8 pb-4">
    Data: <a href="https://row52.com" class="underline">row52.com</a> + eBay sold listings.
    Personal research use only.
  </footer>
</div>

<script>
const $ = (s) => document.querySelector(s);
const fmt = (n) => n == null ? '—' : '$' + Math.round(n).toLocaleString();

// ---------------------------------------------------------------------------
// Exclude filter
// ---------------------------------------------------------------------------
const EXCLUDE_MAP = {
  'ex-engine': ['engine', 'motor', 'long block', 'short block', 'bare block'],
  'ex-trans':  ['transmission', 'transaxle', 'gearbox'],
  'ex-door':   ['door'],
  'ex-body':   ['hood', 'fender', 'bumper', 'quarter panel', 'trunk lid',
                 'liftgate', 'tailgate', 'hatchback'],
};

function getExcludeKeywords() {
  const kw = [];
  for (const [id, words] of Object.entries(EXCLUDE_MAP)) {
    if ($('#' + id).checked) kw.push(...words);
  }
  return kw;
}

function isExcluded(title, keywords) {
  if (!keywords.length) return false;
  const t = title.toLowerCase();
  return keywords.some(k => t.includes(k));
}

// ---------------------------------------------------------------------------
// Render top-parts list (called on load and whenever exclude filter changes)
// ---------------------------------------------------------------------------
const _topPartsData = {};        // vehicle_id -> parts array
const _topPartsLists = {};       // vehicle_id -> <div> list container

function renderTopParts(el, parts) {
  const kw = getExcludeKeywords();
  const visible = parts.filter(p => !isExcluded(p.title, kw));

  if (!visible.length) {
    el.innerHTML = '<p class="text-slate-400 text-xs">All results hidden by current filters.</p>';
    return;
  }

  el.innerHTML = visible.map((p, i) => {
    const meta = p.sample_count > 1
      ? `avg of ${p.sample_count} sales`
      : (p.sold_date_str || '');
    return `
    <a href="${p.url || '#'}" target="_blank" rel="noopener"
      class="flex items-start gap-2 py-2.5 border-b border-slate-100 last:border-b-0 hover:bg-slate-50 active:bg-slate-100 group">
      <span class="text-xs text-slate-400 w-5 flex-shrink-0 text-right pt-0.5 tabular-nums">${i + 1}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-3">
          <span class="text-sm text-slate-700 group-hover:text-blue-600 break-words leading-snug">${p.title}</span>
          <span class="text-sm font-semibold text-emerald-700 flex-shrink-0 tabular-nums">${fmt(p.price_usd)}</span>
        </div>
        ${meta ? `<div class="text-xs text-slate-400 mt-0.5">${meta}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

function reRenderAll() {
  for (const [vid, parts] of Object.entries(_topPartsData)) {
    if (_topPartsLists[vid]) renderTopParts(_topPartsLists[vid], parts);
  }
}

['ex-engine', 'ex-trans', 'ex-door', 'ex-body'].forEach(id => {
  $('#' + id).addEventListener('change', reRenderAll);
});

// ---------------------------------------------------------------------------
// Status + vehicles
// ---------------------------------------------------------------------------
async function loadStatus() {
  const r = await fetch('/api/status');
  const s = await r.json();
  const lr = s.last_run;
  let str = `${s.vehicle_count} vehicles tracked. `;
  if (s.running) {
    str += 'Run in progress.';
  } else if (lr && lr.finished_at) {
    const d = new Date(lr.finished_at);
    const dateStr = window.innerWidth < 640 ? d.toLocaleDateString() : d.toLocaleString();
    str += `Last run ${dateStr} — ${lr.vehicles_matched} matched.`;
    if (lr.error) str += ' (errors)';
  } else {
    str += 'No runs yet — tap Run now.';
  }
  $('#status-line').textContent = str;
  $('#btn-run').disabled = s.running;
  if (s.running) startProgressPolling();
}

async function loadYards() {
  try {
    const r = await fetch('/api/yards');
    const yards = await r.json();
    const sel = $('#filter-yard');
    const current = sel.value;
    sel.innerHTML = '<option value="">All locations</option>' +
      yards.map(y => `<option value="${y.replace(/"/g, '&quot;')}">${y}</option>`).join('');
    if (current && yards.includes(current)) sel.value = current;
  } catch (e) { /* non-fatal */ }
}

async function loadVehicles() {
  const make = $('#filter-make').value;
  const yard = $('#filter-yard').value;
  const sort = $('#filter-sort').value;
  const params = new URLSearchParams({ sort });
  if (make) params.set('make', make);
  if (yard) params.set('yard', yard);
  const r = await fetch('/api/vehicles?' + params.toString());
  const data = await r.json();
  $('#result-count').textContent = `${data.length} result${data.length !== 1 ? 's' : ''}`;

  const root = $('#vehicles');
  root.innerHTML = '';
  if (!data.length) {
    root.innerHTML = `<div class="text-slate-500 text-sm bg-white border border-slate-200 rounded-xl p-8 text-center">
      No vehicles match. Tap <b>Run now</b> to start a search.
    </div>`;
    return;
  }

  for (const v of data) {
    const makeUpper = (v.make || '').toUpperCase();
    const pill = makeUpper === 'BMW' ? 'pill-bmw' : makeUpper === 'VOLKSWAGEN' ? 'pill-vw' : 'pill-other';
    const card = document.createElement('details');
    card.className = 'bg-white border border-slate-200 rounded-xl shadow-sm';

    const vinShort = v.vin ? v.vin.slice(-8) : '—';

    card.innerHTML = `
      <summary class="flex items-center gap-2 sm:gap-4 p-3 sm:p-4 rounded-xl">
        <img src="${v.image_url || ''}" onerror="this.style.display='none'"
          class="w-16 h-11 sm:w-24 sm:h-16 object-cover rounded bg-slate-100 flex-shrink-0" />
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 sm:gap-2 flex-wrap">
            <span class="pill ${pill}">${v.make || '—'}</span>
            <span class="font-semibold text-sm sm:text-base">${v.year || ''} ${v.model || ''}</span>
          </div>
          <div class="text-xs text-slate-500 mt-0.5 truncate">
            ${v.yard_name || '—'} · Row ${v.row_number || '?'}
          </div>
          <div class="text-xs text-slate-400 truncate">
            <span class="hidden sm:inline">Added ${v.date_added_to_yard || '?'} · </span>VIN …${vinShort}
          </div>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="text-xs text-slate-400 mb-0.5">tap to see parts</div>
        </div>
      </summary>

      <div class="border-t border-slate-100 p-3 sm:p-4" data-top-parts="${v.id}">
        <div class="text-slate-400 text-sm">Loading…</div>
      </div>
    `;

    card.addEventListener('toggle', async () => {
      if (!card.open) return;
      const topTarget = card.querySelector(`[data-top-parts="${v.id}"]`);
      if (topTarget.dataset.loaded) return;
      topTarget.dataset.loaded = '1';

      const tr = await fetch(`/api/vehicles/${v.id}/top-parts`);
      const parts = await tr.json();

      topTarget.innerHTML = '';

      if (!parts.length) {
        topTarget.innerHTML = `
          <p class="text-xs font-semibold text-slate-500 mb-1">Top 30 highest value parts</p>
          <p class="text-slate-400 text-sm">No data yet — run <code>python price_locally.py</code> to fetch.</p>`;
        return;
      }

      _topPartsData[v.id] = parts;
      const listEl = document.createElement('div');
      _topPartsLists[v.id] = listEl;
      renderTopParts(listEl, parts);

      const header = document.createElement('div');
      header.className = 'flex flex-wrap items-baseline justify-between gap-1 mb-2';
      header.innerHTML = `
        <p class="text-xs font-semibold text-slate-500">Top 30 highest value parts — ${v.year} ${v.make} ${v.model}</p>
        <p class="text-xs text-slate-400">Avg price shown when multiple listings matched. Tap to view on eBay.</p>`;
      topTarget.appendChild(header);
      topTarget.appendChild(listEl);
    });

    root.appendChild(card);
  }
}

// ---------------------------------------------------------------------------
// Progress polling
// ---------------------------------------------------------------------------
function updateProgressUI(p) {
  const banner = $('#progress-banner');
  if (!p.running) { banner.classList.remove('visible'); return; }
  banner.classList.add('visible');
  $('#progress-phase').textContent = p.phase_label || 'Running…';
  const fill = $('#progress-fill');
  if (p.phase === 'scraping' || p.vehicles_total === 0) {
    fill.classList.add('indeterminate');
    $('#progress-counts').textContent = 'Scraping Row52…';
    $('#progress-vehicle').textContent = '';
  } else {
    fill.classList.remove('indeterminate');
    const pct = Math.round((p.vehicles_done / p.vehicles_total) * 100);
    fill.style.width = pct + '%';
    $('#progress-counts').textContent = `${p.vehicles_done}/${p.vehicles_total} vehicles`;
    $('#progress-vehicle').textContent = p.current_vehicle ? `Processing: ${p.current_vehicle}` : '';
  }
}

let _progressPoll = null;
function startProgressPolling() {
  if (_progressPoll) return;
  _progressPoll = setInterval(async () => {
    const r = await fetch('/api/progress');
    const p = await r.json();
    updateProgressUI(p);
    if (!p.running) {
      clearInterval(_progressPoll); _progressPoll = null;
      loadStatus(); loadYards(); loadVehicles();
    }
  }, 2000);
}

async function runNow() {
  $('#btn-run').disabled = true;
  await fetch('/api/run-now', { method: 'POST' });
  updateProgressUI({ running: true, phase: 'scraping', phase_label: 'Scraping Row52…', vehicles_total: 0 });
  startProgressPolling();
}

async function clearCache() {
  if (!confirm('Clear all top-sold data? The next price_locally.py run will re-fetch everything.')) return;
  const btn = $('#btn-clear');
  btn.disabled = true;
  btn.textContent = 'Clearing…';
  await fetch('/api/clear-cache', { method: 'POST' });
  btn.textContent = 'Clear cache';
  btn.disabled = false;
  loadStatus();
}

$('#btn-run').addEventListener('click', runNow);
$('#btn-refresh').addEventListener('click', () => { loadStatus(); loadYards(); loadVehicles(); });
$('#btn-clear').addEventListener('click', clearCache);
['filter-make', 'filter-yard', 'filter-sort'].forEach(id => {
  $('#' + id).addEventListener('change', loadVehicles);
});

loadStatus();
loadYards();
loadVehicles();
</script>
</body>
</html>
