<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — RadioB Used Parts Search</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <h1 class="text-xl font-bold text-center mb-6">RadioB Used Parts Search</h1>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
      <h2 class="text-base font-semibold mb-4">Sign in</h2>

      <div id="error-msg" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
        Invalid username or password.
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-600 block mb-1">Username</label>
          <input id="username" name="username" type="text" autocomplete="username"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required autofocus />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 block mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-semibold px-4 py-2.5 rounded-lg disabled:opacity-50">
          Sign in
        </button>
      </form>
    </div>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
if (params.get('error')) {
  document.getElementById('error-msg').classList.remove('hidden');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const body = new URLSearchParams({
    username: document.getElementById('username').value,
    password: document.getElementById('password').value,
    next: params.get('next') || '/',
  });

  const r = await fetch('/login', { method: 'POST', body });
  if (r.redirected) {
    window.location.href = r.url;
  } else {
    window.location.href = '/login?error=1';
  }
});
</script>
</body>
</html>
