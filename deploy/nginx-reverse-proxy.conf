# Cloudways reverse-proxy snippet.
#
# Cloudways' Nginx config sits in front of Apache. To route a hostname (or a
# subpath) at uvicorn instead of Apache, you have two paths:
#
# Path A (recommended) -- Open a Cloudways support ticket and ask them to
#   "add an Nginx reverse-proxy upstream for application {APP_NAME} pointing
#   at 127.0.0.1:{PORT}". They do this routinely and it's the cleanest way.
#   Paste the snippet below into the ticket.
#
# Path B -- Edit the per-application Nginx vhost directly via SSH:
#     sudo nano /etc/nginx/sites-available/{APP_NAME}
#   then add the `location` block inside the existing `server { ... }` and
#     sudo nginx -t && sudo systemctl reload nginx
#
# Either way, replace {PORT} with the uvicorn port from supervisor.conf
# (default 8000).

location / {
    proxy_pass         http://127.0.0.1:{PORT};
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 90s;
}

# If you want to run uvicorn at a subpath (e.g. /uvps) while leaving the rest
# of the application as-is, replace `location /` with `location /uvps/` and
# set `proxy_pass http://127.0.0.1:{PORT}/;` (note the trailing slash).
