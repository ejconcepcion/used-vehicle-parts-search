# Nginx reverse-proxy config for the Used Vehicle Parts Search app on a Droplet.
#
# This file is a reference template. droplet-deploy.sh writes the live config
# automatically at /etc/nginx/sites-available/uvps — you only need this file
# if you are configuring Nginx manually.
#
# --------------------------------------------------------------------------
# IP-only (no domain)
# --------------------------------------------------------------------------
#
# Place at /etc/nginx/sites-available/uvps and symlink:
#   ln -sf /etc/nginx/sites-available/uvps /etc/nginx/sites-enabled/uvps
#   nginx -t && systemctl reload nginx
#
# Replace 8000 with your actual uvicorn port if you changed it.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
    }
}

# --------------------------------------------------------------------------
# With domain (replace yourdomain.com)
# --------------------------------------------------------------------------
# After pointing your DNS A record to the Droplet's IP, swap the server block
# above with this one, then run Certbot to add SSL:
